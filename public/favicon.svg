<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient: Deep slate to rich dark blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    
    <!-- Code Bracket Gradient: Vibrant neon cyan, blue, to purple -->
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle Inner Glow / Drop Shadow Filter for a premium look -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Dark, modern squircle background -->
  <rect width="100" height="100" rx="26" ry="26" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5" />

  <!-- Code bracket </ > paths -->
  <!-- Left bracket: < -->
  <path d="M 32 35 L 18 50 L 32 65" fill="none" stroke="url(#codeGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Right bracket: > -->
  <path d="M 68 35 L 82 50 L 68 65" fill="none" stroke="url(#codeGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Slash: / -->
  <path d="M 56 30 L 44 70" fill="none" stroke="url(#codeGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
</svg>
