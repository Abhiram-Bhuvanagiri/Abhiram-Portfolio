<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <!-- Prevent white flash on dark theme initial load -->
    <meta name="theme-color" content="#030303" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f3eadc" media="(prefers-color-scheme: light)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;800&display=swap"
    >
    <title>Abhiram Bhuvanagiri | Full Stack Developer</title>
    <meta name="description" content="Portfolio of Abhiram Bhuvanagiri, Full Stack Developer">
    <meta name="keywords" content="Abhiram Bhuvanagiri, Full Stack Developer, Vue, Tailwind CSS, Web Development">
    <meta name="author" content="Abhiram Bhuvanagiri">
    <link rel="manifest" href="/manifest.json" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:title" content="Abhiram Bhuvanagiri | Full Stack Developer" />
    <meta property="og:description" content="Portfolio of Abhiram Bhuvanagiri, Full Stack Developer" />
    <meta property="og:image" content="/favicon.svg" />
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="/" />
    <meta property="twitter:title" content="Abhiram Bhuvanagiri | Full Stack Developer" />
    <meta property="twitter:description" content="Portfolio of Abhiram Bhuvanagiri, Full Stack Developer" />
    <meta property="twitter:image" content="/favicon.svg" />
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Abhiram Bhuvanagiri",
        "jobTitle": "Full Stack Developer",
        "url": "https://github.com/Abhiram-Bhuvanagiri",
        "sameAs": [
          "https://www.linkedin.com/in/abhiram-bhuvanagiri-394a4a377/",
          "https://github.com/Abhiram-Bhuvanagiri"
        ],
        "description": "Full Stack Developer with a strong passion for building scalable web applications and enhancing user experience through clean, efficient, and maintainable code."
      }
    </script>
    <!-- Inline theme restoration to prevent FOUC (flash of incorrect theme) -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="contact" />
      <input name="bot-field" />
      <input name="website" />
      <input name="_gotcha" />
      <input name="name" />
      <input name="email" />
      <textarea name="message"></textarea>
    </form>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
